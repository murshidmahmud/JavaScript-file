<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    
    <script>

        //length:
        let char = "Bangladesh";
        char = char.length;
        document.write(char, "<br>");
        

        //charAt():
        let a = "Murshid";
        a = a.charAt(2);
        document.write(a, "<br>");

        //concat():
        let b = "I love";
        let c = " my Mother";
        let d = b.concat(c);
        document.write(d + "<br>");

        //slice():
        const x = "Motherland";
        let y = x.slice(2);
        document.write(y, "<br>");

        //toUpperCase():
        let name = "Bangladesh";
        name = name.toUpperCase();
        document.write(name, '<br>');

        //toLowerCase():
        // let user = prompt("Enter the name: ");
        // user = user.toLowerCase();
        // document.write(user, "<br>");

        //split().join():
        let joinname = "Hello World";
        joinname = joinname.split(" ").join("");
        document.write(joinname, "<br>");

        
    </script>
</body>
</html>
