<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        document.write("<h1>Make a Simple Calculator</h1> </br>");

        let num1 = prompt("Enter the 1st number: ");        // input string আকারে নেয়
        let num2 = prompt("Enter the 2nd number: ");

        num1 = parseInt(num1,10);                          //convert string to int;
        num2 = parseInt(num2,10);

        let sum, sub;

        sum = num1 + num2;
        document.write("Addition is: ", sum, "<br/>");

        sub = num1-num2;
        document.write("Subtraction is: " + sub + "<br/>");



    </script>
</body>
</html>
